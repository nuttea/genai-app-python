name: Datadog Code Security

# ── Trigger design ────────────────────────────────────────────────────────────
# SAST and SCA actions ONLY support the 'push' event (Datadog requirement).
# Running them on 'pull_request' is not supported and will break the product.
#
# ── How Datadog PR Gates work ─────────────────────────────────────────────────
# PR Gates are configured in the Datadog UI and enforced via the GitHub App —
# no additional CI step is required here.
#
# The flow is:
#   1. Developer pushes a feature branch  →  this workflow runs SAST + SCA
#      and uploads results to Datadog for that branch/commit.
#   2. Developer opens a PR               →  Datadog evaluates the configured
#      PR Gate rules against the uploaded results.
#   3. Datadog posts a GitHub Check       →  pass ✓ or fail ✗ on the PR.
#   4. GitHub branch protection           →  can block merge if the check fails.
#
# For step 1 to work on feature branches, this workflow must trigger on ALL
# pushes (no branch filter), not just main/develop.
#
# Setup checklist (one-time, done in the Datadog UI):
#   1. Install the Datadog GitHub App with permissions:
#        Checks: Read & Write
#        Pull Requests: Read & Write
#        Contents: Read
#   2. Go to Security → Code Security → Settings → Repository Settings
#   3. Configure PR Gate rules (severity threshold, scan types, etc.)
#   4. In GitHub: Settings → Branches → add a branch protection rule for
#      'main' that requires the "Datadog Code Security" check to pass.
#
# Docs: https://docs.datadoghq.com/quality_gates/?tab=staticanalysis
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────
  # SAST — Static Code Analysis
  # Scans first-party Python, JS/TS, and Docker code for security
  # vulnerabilities using rulesets in static-analysis.datadog.yml.
  # Docs: https://docs.datadoghq.com/security/code_security/static_analysis/github_actions/
  # ─────────────────────────────────────────────────────────────
  datadog-sast:
    name: SAST (Static Code Analysis)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Datadog Static Analyzer
        id: datadog-static-analysis
        uses: DataDog/datadog-static-analyzer-github-action@v3
        with:
          dd_api_key: ${{ secrets.DD_API_KEY }}
          dd_app_key: ${{ secrets.DD_APP_KEY }}
          dd_site: "datadoghq.com"
          cpu_count: 2
          enable_performance_statistics: false
          # diff_aware=true (default): on feature branches only the files
          # changed in this commit are scanned, keeping CI fast.
          # On the default branch a full scan always runs.
          diff_aware: true

  # ─────────────────────────────────────────────────────────────
  # SCA — Software Composition Analysis
  # Generates an SBOM from all lock files (poetry.lock,
  # package-lock.json, uv.lock …) and uploads it to Datadog to
  # detect known CVEs in open-source dependencies.
  # Docs: https://docs.datadoghq.com/security/code_security/software_composition_analysis/setup_static/?tab=github
  # ─────────────────────────────────────────────────────────────
  datadog-sca:
    name: SCA (Software Composition Analysis)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Datadog SCA — SBOM Generation and Upload
        id: datadog-sca
        uses: DataDog/datadog-sca-github-action@main
        with:
          dd_api_key: ${{ secrets.DD_API_KEY }}
          dd_app_key: ${{ secrets.DD_APP_KEY }}
          dd_site: "datadoghq.com"
